<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Upload a single HTML file and share it as a sandboxed live preview." />
    <link rel="canonical" href="https://sharehtml.zhenjia.dev" />
    <link rel="sitemap" href="/sitemap.xml" />
    <link rel="alternate" type="text/markdown" href="/llms.txt" title="AI-readable site guide" />
    <link rel="api-catalog" href="/.well-known/api-catalog" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sharehtml.zhenjia.dev" />
    <meta property="og:title" content="Share HTML" />
    <meta property="og:description" content="Upload one HTML file and share it as a sandboxed live preview." />
    <meta name="twitter:card" content="summary" />
    <title>Share HTML</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const provideShareHtmlContext = () => {
          const modelContext = navigator.modelContext;
          if (!modelContext || typeof modelContext.provideContext !== "function") return;

          modelContext.provideContext({
            tools: [
              {
                name: "describe_share_html",
                description: "Return the Share HTML routes, API discovery URLs, and safety model.",
                inputSchema: { type: "object", properties: {}, additionalProperties: false },
                execute: async () => ({
                  content: [
                    {
                      type: "text",
                      text: [
                        "# Share HTML",
                        "",
                        "Canonical origin: https://sharehtml.zhenjia.dev",
                        "OpenAPI: https://sharehtml.zhenjia.dev/openapi.json",
                        "AI guide: https://sharehtml.zhenjia.dev/llms.txt",
                        "MCP endpoint: https://sharehtml.zhenjia.dev/mcp",
                        "",
                        "Use /s/{slug} for public share metadata and /v/{slug}/ for the sandboxed uploaded HTML preview."
                      ].join("\n")
                    }
                  ]
                })
              },
              {
                name: "get_public_share",
                description: "Fetch public metadata for a Share HTML slug.",
                inputSchema: {
                  type: "object",
                  properties: {
                    slug: { type: "string", description: "Public Share HTML slug" }
                  },
                  required: ["slug"],
                  additionalProperties: false
                },
                execute: async (args) => {
                  const slug = args && args.slug;
                  if (typeof slug !== "string" || !slug) {
                    return { content: [{ type: "text", text: "Missing required slug." }], isError: true };
                  }

                  const response = await fetch(`/api/public/shares/${encodeURIComponent(slug)}`);
                  return {
                    content: [
                      {
                        type: "text",
                        text: await response.text()
                      }
                    ],
                    isError: !response.ok
                  };
                }
              }
            ]
          });
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", provideShareHtmlContext, { once: true });
        } else {
          provideShareHtmlContext();
        }
      })();
    </script>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
