name: CI / Release Gate

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "wrangler.jsonc"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "wrangler.jsonc"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: share-html-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and typecheck
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

  trigger-cloudflare-build:
    name: Trigger Cloudflare build
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Workers Builds deploy hook
        env:
          CLOUDFLARE_WORKERS_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_WORKERS_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$CLOUDFLARE_WORKERS_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing CLOUDFLARE_WORKERS_DEPLOY_HOOK_URL repository secret."
            exit 1
          fi

          curl --fail --show-error --request POST "$CLOUDFLARE_WORKERS_DEPLOY_HOOK_URL"
