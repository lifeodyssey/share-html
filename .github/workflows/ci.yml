name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "wrangler.jsonc"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "wrangler.jsonc"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: share-html-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and typecheck
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run
